/* ─── Hooks ─── */
function useInView(threshold=0.08){
  const ref=useRef(null);
  const[inView,setInView]=useState(false);
  useEffect(()=>{
    const el=ref.current;if(!el)return;
    const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting)setInView(true)},{threshold});
    obs.observe(el);return()=>obs.disconnect();
  },[threshold]);
  return[ref,inView];
}

function AnimatedSection({children,style={},delay=0}){
  const[ref,inView]=useInView();
  return(
    <div ref={ref} style={{
      opacity:inView?1:0,
      transform:inView?"translateY(0)":"translateY(40px)",
      transition:`all 0.9s cubic-bezier(0.16,1,0.3,1) ${delay}s`,
      ...style,
    }}>{children}</div>
  );
}

/* ─── Carousel Component ─── */
function Carousel({images,height=320,autoPlay=4000}){
  const[idx,setIdx]=useState(0);
  const len=images.length;
  useEffect(()=>{
    if(!autoPlay||len<=1)return;
    const t=setInterval(()=>setIdx(p=>(p+1)%len),autoPlay);
    return()=>clearInterval(t);
  },[autoPlay,len]);
  return(
    <div style={{position:"relative",overflow:"hidden",borderRadius:18,border:`1px solid ${GOLD}18`,height}}>
      <div style={{display:"flex",transition:"transform 0.6s cubic-bezier(0.25,1,0.5,1)",transform:`translateX(-${idx*100}%)`,height:"100%"}}>
        {images.map((img,i)=>(
          <div key={i} style={{minWidth:"100%",height:"100%",position:"relative"}}>
            {img.src?(
              <img src={img.src} alt={img.alt||""} loading="lazy" style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
            ):(
              <div style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",background:`linear-gradient(135deg,${NAVY}08,${GOLD}08)`,flexDirection:"column",gap:8}}>
                <span style={{fontSize:40,opacity:0.15}}>📸</span>
                <span style={{color:TEXT_LIGHT,fontSize:13}}>{img.alt||"Photo à venir"}</span>
              </div>
            )}
            {img.caption&&<div style={{position:"absolute",bottom:0,left:0,right:0,padding:"24px 16px 12px",background:"linear-gradient(transparent,rgba(10,22,40,0.7))"}}>
              <span style={{color:CREAM,fontSize:13,fontWeight:600}}>{img.caption}</span>
            </div>}
          </div>
        ))}
      </div>
      {len>1&&<div style={{position:"absolute",bottom:10,left:"50%",transform:"translateX(-50%)",display:"flex",gap:6}}>
        {images.map((_,i)=>(
          <button key={i} onClick={()=>setIdx(i)} style={{width:i===idx?20:8,height:8,borderRadius:4,border:"none",background:i===idx?GOLD:`${CREAM}40`,cursor:"pointer",transition:"all 0.3s",padding:0}}/>
        ))}
      </div>}
    </div>
  );
}

/* ─── Mon Wallet — Espace Client avec Cal.com intégré ─── */
function WalletClient(){
  const WALLET_API="https://script.google.com/macros/s/AKfycbzox1toN9GY7dMob2NP71ldDNYM93ZRzcTo4M4zTae8RjAk9tqs8bvuStNsedltQ3pibw/exec";
  const[email,setEmail]=useState("");
  const[securityCode,setSecurityCode]=useState("");
  const[codeSent,setCodeSent]=useState(false);
  const[codeVerified,setCodeVerified]=useState(false);
  const[client,setClient]=useState(null);
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState("");
  const[success,setSuccess]=useState("");
  const[prestation,setPrestation]=useState("indiv");
  const[showCal,setShowCal]=useState(false);
  const[booking,setBooking]=useState(false);
  const calRef=useRef(null);

  const prestations=[
    {key:"indiv",label:"Cours individuel 1h",credits:55,calLink:"ml-padel/indiv"},
    {key:"duo",label:"Collectif Duo 1h (/pers.)",credits:35,calLink:"ml-padel/collectif"},
    {key:"trio",label:"Collectif Trio 1h (/pers.)",credits:25,calLink:"ml-padel/collectif"},
    {key:"quatuor",label:"Collectif Quatuor 1h (/pers.)",credits:20,calLink:"ml-padel/collectif"},
    {key:"stage",label:"Stage vacances",credits:150,calLink:"ml-padel/stage-adulte"},
    {key:"masterclass4",label:"Masterclass WE 4j",credits:100,calLink:"ml-padel/masterclass-week-end-2-jours-4-joueurs"},
    {key:"masterclass8",label:"Masterclass WE 8j",credits:80,calLink:"ml-padel/masterclass-week-end-2-jours-8-joueurs"},
  ];

  // Écouter les messages postMessage de Cal.com pour détecter une réservation réussie
  useEffect(()=>{
    const handler=(e)=>{
      if(e.origin&&e.origin.includes("cal.com")){
        try{
          const data=typeof e.data==="string"?JSON.parse(e.data):e.data;
          if(data&&(data.type==="bookingSuccessful"||(data.action==="bookingSuccessful"))){
            handleBookingSuccess(data);
          }
        }catch(ex){}
      }
    };
    window.addEventListener("message",handler);
    return()=>window.removeEventListener("message",handler);
  },[]);

  // Référence stable pour le handler de booking
  const emailRef=useRef(email);
  const prestationRef=useRef(prestation);
  const clientRef=useRef(client);
  useEffect(()=>{emailRef.current=email},[email]);
  useEffect(()=>{prestationRef.current=prestation},[prestation]);
  useEffect(()=>{clientRef.current=client},[client]);

  const handleBookingSuccess=async(eventData)=>{
    const currentEmail=emailRef.current;
    const currentPrestation=prestationRef.current;
    const currentClient=clientRef.current;
    if(!currentClient||!currentEmail)return;
    const p=prestations.find(x=>x.key===currentPrestation);
    if(!p)return;

    setBooking(true);setError("");
    try{
      const dateStr=new Date().toISOString().split("T")[0];
      const r=await fetch(WALLET_API+"?action=debit&email="+encodeURIComponent(currentEmail)+"&prestation="+encodeURIComponent(currentPrestation)+"&date="+encodeURIComponent(dateStr)+"&creneau=Via+Cal.com&nbPersonnes=1");
      const txt=await r.text();
      let d;try{d=JSON.parse(txt)}catch(e){setError("Erreur serveur");setBooking(false);return}
      if(d.success){
        setSuccess("Réservation confirmée via Cal.com ! "+p.label+" — "+d.debit+" cr. débités. Nouveau solde : "+d.nouveauSolde.toFixed(1)+" cr.");
        setClient({...currentClient,solde:d.nouveauSolde});
        setShowCal(false);
      }else{
        setError(d.error||"Erreur lors du débit wallet");
      }
    }catch(err){setError("Erreur de connexion au wallet")}
    setBooking(false);
  };

  // Étape 1 : envoyer le code de sécurité par email
  const sendCode=async()=>{
    const cleanEmail=email.trim().toLowerCase();
    if(!cleanEmail||!cleanEmail.includes("@")){setError("Entrez une adresse email valide");return}
    if(!WALLET_API){setError("Système wallet en cours de configuration");return}
    setLoading(true);setError("");setClient(null);setSuccess("");setShowCal(false);setCodeSent(false);setCodeVerified(false);setSecurityCode("");
    try{
      const r=await fetch(WALLET_API+"?action=sendOtp&email="+encodeURIComponent(cleanEmail));
      const txt=await r.text();
      let d;try{d=JSON.parse(txt)}catch(e){setError("Réponse invalide du serveur");setLoading(false);return}
      if(d.success){setCodeSent(true);setSuccess("Code de sécurité envoyé à "+cleanEmail+" ! Vérifiez votre boîte mail.");}
      else setError(d.error||"Email non trouvé dans le wallet");
    }catch(err){setError("Erreur de connexion")}
    setLoading(false);
  };

  // Étape 2 : vérifier le code et récupérer le solde
  const verifyCode=async()=>{
    const cleanEmail=email.trim().toLowerCase();
    const code=securityCode.trim();
    if(!code||code.length<4){setError("Entrez le code reçu par email");return}
    setLoading(true);setError("");setSuccess("");
    try{
      const r=await fetch(WALLET_API+"?action=verifyOtp&email="+encodeURIComponent(cleanEmail)+"&otp="+encodeURIComponent(code));
      const txt=await r.text();
      let d;try{d=JSON.parse(txt)}catch(e){setError("Réponse invalide du serveur");setLoading(false);return}
      if(d.success){setClient(d.client);setCodeVerified(true);setSuccess("Identité vérifiée !");}
      else setError(d.error||"Code incorrect ou expiré");
    }catch(err){setError("Erreur de connexion")}
    setLoading(false);
  };

  // Reset complet
  const resetWallet=()=>{
    setEmail("");setSecurityCode("");setCodeSent(false);setCodeVerified(false);
    setClient(null);setError("");setSuccess("");setShowCal(false);
  };

  // Afficher le calendrier Cal.com via iframe
  const openCalendar=()=>{
    const p=prestations.find(x=>x.key===prestation);
    if(!p||!client)return;
    if(client.solde<p.credits){setError("Solde insuffisant ("+client.solde.toFixed(1)+" cr. < "+p.credits+" cr.)");return}
    setError("");setSuccess("");setShowCal(true);
  };

  const getCalIframeSrc=()=>{
    const p=prestations.find(x=>x.key===prestation);
    if(!p)return "";
    return `https://cal.com/${p.calLink}?embed=true&theme=dark&layout=month_view`;
  };

  const selectedP=prestations.find(x=>x.key===prestation);

  return(
    <section style={{padding:"60px 24px 0",background:`linear-gradient(175deg,${NAVY} 0%,${NAVY_MID} 100%)`,position:"relative",zIndex:1}}>
      <div style={{maxWidth:showCal?900:700,margin:"0 auto",transition:"max-width 0.4s"}}>
        <AnimatedSection>
          <div style={{
            background:`${CREAM}06`,borderRadius:20,border:`1.5px solid ${GOLD}25`,
            padding:"32px 28px",boxShadow:`0 8px 32px ${GOLD}10`,
          }}>
            <div style={{textAlign:"center",marginBottom:24}}>
              <span style={{color:GOLD,fontSize:11,fontWeight:700,letterSpacing:2.5,textTransform:"uppercase"}}>
                Espace client
              </span>
              <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:900,marginTop:6,color:CREAM}}>
                Mon <span style={{color:GOLD}}>Wallet</span>
              </h3>
              <p style={{fontSize:13,color:`${CREAM}55`,marginTop:6}}>
                Consultez votre solde et réservez directement avec vos crédits
              </p>
            </div>

            {/* Étape 1 : Saisie email */}
            {!codeSent&&!codeVerified&&(
              <div style={{display:"flex",gap:10,marginBottom:16}}>
                <input
                  type="email" placeholder="Entrez votre mail ici"
                  value={email} onChange={e=>setEmail(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&sendCode()}
                  style={{
                    flex:1,padding:"14px 18px",borderRadius:12,border:`1.5px solid ${GOLD}30`,
                    background:`${CREAM}08`,color:CREAM,fontSize:15,fontFamily:"'DM Sans',sans-serif",
                    outline:"none",
                  }}
                />
                <button onClick={sendCode} disabled={loading} style={{
                  padding:"14px 24px",borderRadius:12,border:"none",cursor:"pointer",
                  background:`linear-gradient(135deg,${GOLD},${GOLD_LIGHT})`,color:NAVY,
                  fontWeight:700,fontSize:14,fontFamily:"'DM Sans',sans-serif",
                  opacity:loading?0.6:1,transition:"all 0.3s",whiteSpace:"nowrap",
                }}>
                  {loading?"...":"S'identifier"}
                </button>
              </div>
            )}

            {/* Étape 2 : Saisie code de sécurité */}
            {codeSent&&!codeVerified&&(
              <div>
                <div style={{fontSize:13,color:`${CREAM}66`,marginBottom:10}}>
                  Un code de sécurité a été envoyé à <strong style={{color:GOLD}}>{email}</strong>
                </div>
                <div style={{display:"flex",gap:10,marginBottom:10}}>
                  <input
                    type="text" placeholder="Code de sécurité (4 chiffres)"
                    value={securityCode} onChange={e=>setSecurityCode(e.target.value)}
                    onKeyDown={e=>e.key==="Enter"&&verifyCode()}
                    maxLength={6}
                    style={{
                      flex:1,padding:"14px 18px",borderRadius:12,border:`1.5px solid ${GOLD}30`,
                      background:`${CREAM}08`,color:CREAM,fontSize:20,fontFamily:"'DM Sans',sans-serif",
                      outline:"none",letterSpacing:8,textAlign:"center",fontWeight:700,
                    }}
                  />
                  <button onClick={verifyCode} disabled={loading} style={{
                    padding:"14px 24px",borderRadius:12,border:"none",cursor:"pointer",
                    background:`linear-gradient(135deg,${GOLD},${GOLD_LIGHT})`,color:NAVY,
                    fontWeight:700,fontSize:14,fontFamily:"'DM Sans',sans-serif",
                    opacity:loading?0.6:1,transition:"all 0.3s",whiteSpace:"nowrap",
                  }}>
                    {loading?"...":"Vérifier"}
                  </button>
                </div>
                <button onClick={resetWallet} style={{
                  background:"none",border:"none",color:`${CREAM}40`,fontSize:12,
                  cursor:"pointer",padding:"4px 0",textDecoration:"underline",
                }}>Changer d'email</button>
              </div>

            {/* Après vérification : affichage connecté */}
            {codeVerified&&client&&(
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                <span style={{fontSize:13,color:`${CREAM}55`}}>Connecté : <strong style={{color:GOLD}}>{email}</strong></span>

                  background:`${CREAM}10`,border:`1px solid ${CREAM}15`,borderRadius:8,

/* ─── Scroll Progress Bar ─── */
function ScrollProgress(){
  useEffect(()=>{
    const bar=document.getElementById("scroll-progress");
    const onScroll=()=>{
      const h=document.documentElement.scrollHeight-window.innerHeight;
      bar.style.width=(window.scrollY/h*100)+"%";
    };
    window.addEventListener("scroll",onScroll);
    return()=>window.removeEventListener("scroll",onScroll);
  },[]);
  return <div id="scroll-progress"/>;
}

/* ─── Back to Top Button ─── */
function BackToTop(){
  const[visible,setVisible]=useState(false);
  useEffect(()=>{
    const fn=()=>setVisible(window.scrollY>600);
    window.addEventListener("scroll",fn);
    return()=>window.removeEventListener("scroll",fn);
  },[]);
  return(
    <button className={`back-to-top ${visible?"visible":""}`}
      onClick={()=>window.scrollTo({top:0,behavior:"smooth"})}
      aria-label="Retour en haut"
    >↑</button>
  );
}

/* ─── Animated Counter Hook ─── */
function useCounter(end,duration=2000,startOnView=false){
  const[count,setCount]=useState(0);
  const ref=useRef(null);
  const started=useRef(false);
  useEffect(()=>{
    if(!startOnView||started.current)return;
    const el=ref.current;if(!el)return;
    const obs=new IntersectionObserver(([e])=>{
      if(e.isIntersecting&&!started.current){
        started.current=true;
        const s=performance.now();
        const animate=(now)=>{
          const p=Math.min((now-s)/duration,1);
          const eased=1-Math.pow(1-p,3);
          setCount(Math.round(eased*end));
          if(p<1)requestAnimationFrame(animate);
        };
        requestAnimationFrame(animate);
      }
    },{threshold:0.3});
    obs.observe(el);
    return()=>obs.disconnect();
  },[end,duration,startOnView]);
  return[ref,count];
}
