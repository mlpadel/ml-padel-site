function useInView(threshold=0.08){
  const ref=useRef(null);
  const[inView,setInView]=useState(false);
  useEffect(()=>{
    const el=ref.current;if(!el)return;
    const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting)setInView(true)},{threshold});
    obs.observe(el);return()=>obs.disconnect();
  },[threshold]);
  return[ref,inView];
}

function AnimatedSection({children,style={},delay=0}){
  const[ref,inView]=useInView();
  return(
    <div ref={ref} style={{
      opacity:inView?1:0,
      transform:inView?"translateY(0)":"translateY(40px)",
      transition:`all 0.9s cubic-bezier(0.16,1,0.3,1) ${delay}s`,
      ...style,
    }}>{children}</div>
  );
}

function Reviews(){
  const[reviews,setReviews]=useState([]);
  const[showAll,setShowAll]=useState(false);
  const[showForm,setShowForm]=useState(false);
  const[formName,setFormName]=useState("");
  const[formRating,setFormRating]=useState(0);
  const[formComment,setFormComment]=useState("");
  const[submitting,setSubmitting]=useState(false);
  const[submitted,setSubmitted]=useState(false);

  useEffect(()=>{
    (async()=>{
      try{
        const snap=await db.collection("reviews").orderBy("createdAt","desc").limit(50).get();
        setReviews(snap.docs.map(d=>({id:d.id,...d.data()})));
      }catch(e){console.error("Firestore read:",e)}
    })();
  },[submitted]);

  const avg=reviews.length?reviews.reduce((s,r)=>s+r.rating,0)/reviews.length:0;

  const handleSubmit=async(e)=>{
    e.preventDefault();
    if(!formName.trim()||!formRating||!formComment.trim())return;
    setSubmitting(true);
    try{
      await db.collection("reviews").add({
        name:formName.trim(),rating:formRating,comment:formComment.trim(),
        createdAt:firebase.firestore.FieldValue.serverTimestamp()
      });
      setFormName("");setFormRating(0);setFormComment("");
      setShowForm(false);setSubmitted(prev=>!prev);
    }catch(e){console.error("Firestore write:",e)}
    setSubmitting(false);
  };

  const displayed=showAll?reviews:reviews.slice(0,3);

  return(
    <section id="reviews" style={{padding:"60px 24px 80px",background:"linear-gradient(175deg,"+NAVY_MID+" 0%,"+NAVY+" 100%)",color:CREAM,position:"relative",zIndex:1}}>
      <div style={{maxWidth:800,margin:"0 auto",textAlign:"center"}}>
        <AnimatedSection>
          <span style={{color:GOLD,fontSize:11,fontWeight:700,letterSpacing:2.5,textTransform:"uppercase"}}>Avis Clients</span>
          <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:"clamp(24px,3.5vw,34px)",fontWeight:900,marginTop:8,marginBottom:20,color:CREAM}}>Ce qu'ils pensent de ML Padel</h2>

          {reviews.length>0&&(
            <div style={{display:"inline-flex",alignItems:"center",gap:14,background:CREAM+"08",border:"1px solid "+GOLD+"30",borderRadius:16,padding:"16px 28px",marginBottom:32}}>
              <span style={{fontSize:42,fontWeight:900,color:GOLD,lineHeight:1}}>{avg.toFixed(1)}</span>
              <div style={{textAlign:"left"}}>
                <StarDisplay rating={avg} size={18}/>
                <div style={{fontSize:12,color:CREAM+"60",marginTop:2}}>{reviews.length} avis</div>
              </div>
            </div>
          )}

          {displayed.length>0&&(

function ScrollProgress(){
  useEffect(()=>{
    const bar=document.getElementById("scroll-progress");
    const onScroll=()=>{
      const h=document.documentElement.scrollHeight-window.innerHeight;
      bar.style.width=(window.scrollY/h*100)+"%";
    };
    window.addEventListener("scroll",onScroll);
    return()=>window.removeEventListener("scroll",onScroll);
  },[]);
  return <div id="scroll-progress"/>;
}

/* 芒聰聙芒聰聙芒聰聙 Animated Counter Hook 芒聰聙芒聰聙芒聰聙 */
function useCounter(end,duration=2000,startOnView=false){
  const[count,setCount]=useState(0);
  const ref=useRef(null);
  const started=useRef(false);
  useEffect(()=>{
    if(!startOnView||started.current)return;
    const el=ref.current;if(!el)return;
    const obs=new IntersectionObserver(([e])=>{
      if(e.isIntersecting&&!started.current){
        started.current=true;
        const s=performance.now();
        const animate=(now)=>{
          const p=Math.min((now-s)/duration,1);
          const eased=1-Math.pow(1-p,3);
          setCount(Math.round(eased*end));
          if(p<1)requestAnimationFrame(animate);
        };
        requestAnimationFrame(animate);
      }
    },{threshold:0.3});
    obs.observe(el);
    return()=>obs.disconnect();
  },[end,duration,startOnView]);
  return[ref,count];
}

    @media(max-width:480px){#mlp-bell-card{padding:24px 18px}#mlp-bell-btn{bottom:85px;right:18px;width:44px;height:44px;font-size:18px}}

  overlay.innerHTML=`
    <div id="mlp-bell-card">
      <button id="mlp-bell-close">&times;</button>
      <div id="mlp-bell-content"></div>
    </div>
  `;
  document.body.appendChild(overlay);

  var content=document.getElementById("mlp-bell-content");

  function isSubscribed(){return localStorage.getItem(LS_KEY)==="1"}

  function renderForm(){
    content.innerHTML=`
      <h3>冒聼聰聰 Restez inform脙漏</h3>
      <p>Recevez une alerte d脙篓s qu'un nouveau cours ou une nouveaut脙漏 est disponible.</p>
      <input type="email" id="mlp-bell-email" placeholder="Votre email" required autocomplete="email"/>
      <button id="mlp-bell-sub-btn">S'abonner</button>
      <div id="mlp-bell-msg"></div>
    `;
    document.getElementById("mlp-bell-sub-btn").addEventListener("click",handleSubscribe);
    document.getElementById("mlp-bell-email").addEventListener("keydown",function(ev){if(ev.key==="Enter")handleSubscribe()});
  }

  function renderSubscribed(){
    var email=localStorage.getItem(LS_EMAIL)||"";
    content.innerHTML=`
      <h3>冒聼聰聰 Vous 脙陋tes abonn脙漏 芒聹聯</h3>
      <p>Les alertes sont envoy脙漏es 脙聽<br/><strong>${email}</strong></p>
      <button id="mlp-bell-unsub">Se d脙漏sabonner</button>
    `;
    document.getElementById("mlp-bell-unsub").addEventListener("click",handleUnsubscribe);
  }

  function handleSubscribe(){
    var input=document.getElementById("mlp-bell-email");
    var msg=document.getElementById("mlp-bell-msg");
    var btn=document.getElementById("mlp-bell-sub-btn");
    var email=input.value.trim();
    if(!email||!input.checkValidity()){msg.style.color="#e74c3c";msg.textContent="Veuillez entrer un email valide.";return}
    btn.disabled=true;btn.textContent="Envoi芒聙娄";
    fetch(CCT_ALERT_API+"?action=alert_subscribe&email="+encodeURIComponent(email))

          localStorage.setItem(LS_KEY,"1");
          localStorage.setItem(LS_EMAIL,email);
          msg.style.color="#27ae60";
          msg.textContent="Vous 脙陋tes inscrit ! Vous recevrez les alertes par email.";

  }

  function handleUnsubscribe(){
    var email=localStorage.getItem(LS_EMAIL)||"";
    fetch(CCT_ALERT_API+"?action=alert_unsubscribe&email="+encodeURIComponent(email))
      .then(function(r){return r.json()})
      .then(function(){
        localStorage.removeItem(LS_KEY);

  function toggleBellVisibility(){

  }
  window.addEventListener("scroll",toggleBellVisibility);
  toggleBellVisibility();

  /* 芒聰聙芒聰聙 Events 芒聰聙芒聰聙 */
  bell.addEventListener("click",function(){
    overlay.classList.add("open");
    if(isSubscribed()){renderSubscribed()}else{renderForm()}
  });
  document.getElementById("mlp-bell-close").addEventListener("click",function(){overlay.classList.remove("open")});
  overlay.addEventListener("click",function(ev){if(ev.target===overlay)overlay.classList.remove("open")});
})();

<!-- Scroll Reveal Animations -->
<script>
(function(){
  setTimeout(function(){
    var ids=['tarifs','wallet','galerie','cours-collectifs','boutique','faq','contact','reviews','\u00e9v\u00e9nements'];
    var transforms=['translateX(-40px)','translateX(40px)','translateY(40px)'];
    var animated=[];
    ids.forEach(function(id,i){
      var el=document.getElementById(id);
      if(!el)return;
      var rect=el.getBoundingClientRect();
      if(rect.top<window.innerHeight&&rect.bottom>0)return;
      el.style.opacity='0';
      el.style.transform=transforms[i%3];
      el.offsetHeight;
      el.style.transition='opacity 0.7s ease,transform 0.7s ease';
      animated.push(el);
    });
    var obs=new IntersectionObserver(function(entries){
      entries.forEach(function(e){
        if(e.isIntersecting){
          e.target.style.opacity='1';
          e.target.style.transform='translate(0,0)';
          obs.unobserve(e.target);
        }
      });
    },{threshold:0.1,rootMargin:'0px 0px -40px 0px'});
    animated.forEach(function(el){obs.observe(el)});
  },2000);
})();
</script>

<script>
(function() {
  document.addEventListener("click", function(e) {
    var link = e.target.closest("a");
    if (!link) return;
    var href = link.getAttribute("href") || "";
    if (href.indexOf("cal.com") !== -1) {
      gtag("event", "clic_reserver", { event_category: "conversion", event_label: href });
    }
    if (href.indexOf("wa.me") !== -1) {
      gtag("event", "clic_whatsapp", { event_category: "conversion", event_label: "WhatsApp" });
    }
    if (href === "#wallet") {
      gtag("event", "acces_wallet", { event_category: "engagement", event_label: "Navigation Wallet" });
    }
    if (href.indexOf("pallap") !== -1) {
      gtag("event", "clic_boutique", { event_category: "engagement", event_label: href });
    }
  });
  var sections = ["tarifs","wallet","galerie","avis","academie","contact"];
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        gtag("event", "section_vue", { event_category: "engagement", event_label: entry.target.id });
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.3 });
  setTimeout(function() {
    sections.forEach(function(id) {
      var el = document.getElementById(id);
      if (el) observer.observe(el);
    });
  }, 2000);
})();
</script>
