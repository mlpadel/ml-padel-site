/* ─── Hooks ─── */
function useInView(threshold=0.08){
  const ref=useRef(null);
  const[inView,setInView]=useState(false);
  useEffect(()=>{
    const el=ref.current;if(!el)return;
    const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting)setInView(true)},{threshold});
    obs.observe(el);return()=>obs.disconnect();
  },[threshold]);
  return[ref,inView];
}

function AnimatedSection({children,style={},delay=0}){
  const[ref,inView]=useInView();
  return(
    <div ref={ref} style={{
      opacity:inView?1:0,
      transform:inView?"translateY(0)":"translateY(40px)",
      transition:`all 0.9s cubic-bezier(0.16,1,0.3,1) ${delay}s`,
      ...style,
    }}>{children}</div>
  );
}

/* ─── Mon Wallet — Espace Client avec Cal.com intégré ─── */
function WalletClient(){
  const WALLET_API="https://script.google.com/macros/s/AKfycbzox1toN9GY7dMob2NP71ldDNYM93ZRzcTo4M4zTae8RjAk9tqs8bvuStNsedltQ3pibw/exec";

  const[email,setEmail]=useState("");
  const[otp,setOtp]=useState("");
  const[otpSent,setOtpSent]=useState(false);
  const[client,setClient]=useState(null);
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState("");
  const[success,setSuccess]=useState("");

  const[type,setType]=useState("indiv");
  const[duree,setDuree]=useState("1h");
  const[booking,setBooking]=useState(false);
  const[calcomDone,setCalcomDone]=useState(false);

  const[showHistory,setShowHistory]=useState(false);
  const[history,setHistory]=useState([]);
  const[loadingHist,setLoadingHist]=useState(false);

  const types=[
    {key:"indiv",label:"Individuel",base:55,calcom:CALCOM.indivWallet,hasDuree:true},
    {key:"duo",label:"Duo (2 joueurs)",base:35,calcom:CALCOM.collectifDuoWallet,hasDuree:true,perPers:true},
    {key:"trio",label:"Trio (3 joueurs)",base:25,calcom:CALCOM.collectifTrioWallet,hasDuree:true,perPers:true},
    {key:"quatuor",label:"Quatuor (4 joueurs)",base:20,calcom:CALCOM.collectifQuatuorWallet,hasDuree:true,perPers:true},
    {key:"stage",label:"Stage vacances",base:150,calcom:CALCOM.stageWallet,hasDuree:false},
    {key:"masterclass4",label:"Masterclass WE 4j",base:100,calcom:CALCOM.masterclass4Wallet,hasDuree:false},
    {key:"masterclass8",label:"Masterclass WE 8j",base:80,calcom:CALCOM.masterclass8Wallet,hasDuree:false},
  ];
  const durees=[{key:"1h",label:"1h",mult:1},{key:"1h30",label:"1h30",mult:1.5},{key:"2h",label:"2h",mult:2}];

  const sel=types.find(t=>t.key===type);
  const selD=durees.find(d=>d.key===duree);
  const credits=sel.hasDuree?Math.floor(sel.base*selD.mult):sel.base;
  const prestationKey=sel.hasDuree?type+"_"+duree:type;
  const prestationLabel=sel.label+(sel.hasDuree?" "+selD.label:"")+(sel.perPers?" /pers.":"");

  const sendOtp=async()=>{
    if(!email||!email.includes("@")){setError("Entrez un email valide");return}
    setLoading(true);setError("");
    try{
      const r=await fetch(WALLET_API,{method:"POST",body:JSON.stringify({action:"sendOtp",email})});
      const d=await r.json();
      if(d.success){setOtpSent(true);setError("")}
      else setError(d.error||"Erreur")
    }catch(err){setError("Erreur de connexion")}
    setLoading(false);
  };

  const verifyOtp=async()=>{
    if(!otp||otp.length<4){setError("Entrez le code reçu par email");return}
    setLoading(true);setError("");
    try{
      const r=await fetch(WALLET_API,{method:"POST",body:JSON.stringify({action:"verifyOtp",email,otp})});
      const d=await r.json();
      if(d.success){setClient(d.client);setError("")}
      else setError(d.error||"Code invalide")
    }catch(err){setError("Erreur de connexion")}
    setLoading(false);
  };

  const fetchHistory=async()=>{
    if(showHistory){setShowHistory(false);return}
    setLoadingHist(true);
    try{
      const r=await fetch(WALLET_API,{method:"POST",body:JSON.stringify({action:"history",email})});
      const d=await r.json();
      if(d.success){setHistory(d.history||[]);setShowHistory(true);if(d.client)setClient(prev=>({...prev,solde:d.client.solde}))}
    }catch(err){}
    setLoadingHist(false);
  };

  const bookWithWallet=async()=>{
    if(!client){setError("Client non connecté");return}
    if(client.solde<credits){setError("Solde insuffisant ("+client.solde.toFixed(1)+" cr. < "+credits+" cr.)");return}
    setBooking(true);setError("");setSuccess("");
    var today=new Date().toISOString().split("T")[0];
    try{
      const r=await fetch(WALLET_API,{method:"POST",
        body:JSON.stringify({action:"debit",email:email,prestation:prestationKey,date:today,creneau:"",nbPersonnes:1})});
      const d=await r.json();
      if(d.success){
        setSuccess("Réservation confirmée ! "+prestationLabel+" — "+d.debit+" cr. débités. Nouveau solde : "+d.nouveauSolde.toFixed(1)+" cr.");
        setClient({...client,solde:d.nouveauSolde});
        setCalcomDone(false);
      }else setError(d.error||"Erreur lors du débit");
    }catch(err){setError("Erreur de connexion")}
    setBooking(false);
  };

  const disconnect=()=>{setClient(null);setOtpSent(false);setOtp("");setEmail("");setError("");setSuccess("");setShowHistory(false);setHistory([]);setCalcomDone(false)};

  const inputStyle={width:"100%",padding:"12px 14px",borderRadius:10,border:"1.5px solid "+GOLD+"25",background:CREAM+"06",color:CREAM,fontSize:14,fontFamily:"'DM Sans',sans-serif",outline:"none"};
  const pillActive={padding:"10px 18px",borderRadius:20,border:"none",cursor:"pointer",fontWeight:700,fontSize:13,fontFamily:"'DM Sans',sans-serif",transition:"all 0.3s"};

  return(
    <section style={{padding:"60px 24px 0",background:"linear-gradient(175deg,"+NAVY+" 0%,"+NAVY_MID+" 100%)",position:"relative",zIndex:1}}>
      <div style={{maxWidth:700,margin:"0 auto"}}>
        <AnimatedSection>
          <div style={{
            background:CREAM+"06",borderRadius:20,border:"1.5px solid "+GOLD+"25",
            padding:"32px 28px",boxShadow:"0 8px 32px "+GOLD+"10",
          }}>
            <div style={{textAlign:"center",marginBottom:24}}>
              <span style={{color:GOLD,fontSize:11,fontWeight:700,letterSpacing:2.5,textTransform:"uppercase"}}>
                Espace client
              </span>
              <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:900,marginTop:6,color:CREAM}}>
                Mon <span style={{color:GOLD}}>Wallet</span>
              </h3>
            </div>

            {error&&<div style={{background:"#ff444418",border:"1px solid #ff444444",borderRadius:10,padding:"10px 14px",marginBottom:14,color:"#ff6666",fontSize:13}}>{error}</div>}
            {success&&<div style={{background:GOLD+"15",border:"1px solid "+GOLD+"33",borderRadius:10,padding:"10px 14px",marginBottom:14,color:GOLD,fontSize:13,fontWeight:600}}>{success}</div>}

            {!client&&(<div>
              {!otpSent?(
                <div style={{display:"flex",gap:10,marginBottom:8}}>
                  <input type="email" placeholder="Votre adresse email" value={email}
                    onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendOtp()}
                    style={{...inputStyle,flex:1}}/>
                  <button onClick={sendOtp} disabled={loading} style={{
                    padding:"14px 24px",borderRadius:12,border:"none",cursor:"pointer",
                    background:"linear-gradient(135deg,"+GOLD+","+GOLD_LIGHT+")",color:NAVY,
                    fontWeight:700,fontSize:14,fontFamily:"'DM Sans',sans-serif",
                    opacity:loading?0.6:1,transition:"all 0.3s",whiteSpace:"nowrap",
                  }}>{loading?"...":"Connexion"}</button>
                </div>
              ):(
                <div>
                  <p style={{fontSize:13,color:CREAM+"60",marginBottom:10}}>Code envoyé à <strong style={{color:GOLD}}>{email}</strong></p>
                  <div style={{display:"flex",gap:10,marginBottom:8}}>
                    <input type="text" placeholder="Code à 6 chiffres" value={otp}
                      onChange={e=>setOtp(e.target.value)} onKeyDown={e=>e.key==="Enter"&&verifyOtp()}
                      style={{...inputStyle,flex:1,letterSpacing:4,textAlign:"center",fontSize:18}}/>
                    <button onClick={verifyOtp} disabled={loading} style={{
                      padding:"14px 24px",borderRadius:12,border:"none",cursor:"pointer",
                      background:"linear-gradient(135deg,"+GOLD+","+GOLD_LIGHT+")",color:NAVY,
                      fontWeight:700,fontSize:14,fontFamily:"'DM Sans',sans-serif",
                      opacity:loading?0.6:1,transition:"all 0.3s",whiteSpace:"nowrap",
                    }}>{loading?"...":"Valider"}</button>
                  </div>
                  <button onClick={()=>{setOtpSent(false);setOtp("");setError("")}} style={{
                    background:"transparent",border:"none",color:CREAM+"40",fontSize:12,
                    cursor:"pointer",fontFamily:"'DM Sans',sans-serif",marginTop:4,
                  }}>Changer d'email</button>
                </div>
              )}
            </div>)}

            {client&&(<div>
              <div style={{
                display:"flex",justifyContent:"space-between",alignItems:"center",
                padding:"18px 20px",borderRadius:14,
                background:GOLD+"10",border:"1px solid "+GOLD+"22",marginBottom:6,
              }}>
                <div>
                  <div style={{fontSize:15,fontWeight:700,color:CREAM}}>{client.prenom} {client.nom}</div>
                  <div style={{fontSize:12,color:CREAM+"50",marginTop:2}}>ID : {client.id}</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontFamily:"'Playfair Display',serif",fontSize:28,fontWeight:900,color:GOLD}}>
                    {client.solde.toFixed(1)}
                  </div>
                  <div style={{fontSize:11,color:CREAM+"50"}}>crédits disponibles</div>
                </div>
              </div>

              <div style={{display:"flex",justifyContent:"space-between",marginBottom:20}}>
                <button onClick={fetchHistory} style={{background:"transparent",border:"none",color:CREAM+"45",fontSize:12,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontWeight:600}}>
                  {loadingHist?"...":showHistory?"Masquer l'historique":"Voir l'historique"}
                </button>
                <button onClick={disconnect} style={{background:"transparent",border:"none",color:CREAM+"30",fontSize:12,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>
                  Déconnexion
                </button>
              </div>

              {showHistory&&history.length>0&&(
                <div style={{marginBottom:20,padding:"14px 16px",borderRadius:12,background:CREAM+"04",border:"1px solid "+CREAM+"08"}}>
                  {history.map(function(h,i){return(
                    <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:i<history.length-1?"1px solid "+CREAM+"08":"none"}}>
                      <div>
                        <div style={{fontSize:13,fontWeight:600,color:h.type==="recharge"?"#4ecdc4":"#ff6666"}}>
                          {h.type==="recharge"?"+":""}{h.montant} cr.
                        </div>
                        <div style={{fontSize:11,color:CREAM+"35",marginTop:2}}>{h.detail}</div>
                      </div>
                      <div style={{fontSize:11,color:CREAM+"30"}}>{h.date?new Date(h.date).toLocaleDateString("fr-FR"):""}</div>
                    </div>
                  )})}
                </div>
              )}

              <div style={{borderTop:"1px solid "+CREAM+"10",paddingTop:20}}>

function StarDisplay({rating,size=16,color=GOLD}){
  return(
    <span style={{display:"inline-flex",gap:1}}>
      {[1,2,3,4,5].map(i=>{
        const fill=rating>=i?1:rating>=i-0.5?0.5:0;
        return(
          <svg key={i} width={size} height={size} viewBox="0 0 20 20" fill="none">
            <defs><linearGradient id={"sf"+i+size}><stop offset={fill*100+"%"} stopColor={color}/><stop offset={fill*100+"%"} stopColor={color+"30"}/></linearGradient></defs>
            <path d="M10 1l2.5 5.5L18 7.5l-4 4 1 5.5L10 14.5 4.9 17l1-5.5-4-4 5.6-1z" fill={"url(#sf"+i+size+")"}/>
          </svg>
        );
      })}
    </span>
  );
}

function StarInput({value,onChange}){
  const[hover,setHover]=useState(0);
  return(
    <span style={{display:"inline-flex",gap:4,cursor:"pointer"}}>
      {[1,2,3,4,5].map(i=>(
        <svg key={i} width={32} height={32} viewBox="0 0 20 20" fill="none"
          onMouseEnter={()=>setHover(i)} onMouseLeave={()=>setHover(0)}
          onClick={()=>onChange(i)} style={{transition:"transform 0.15s",transform:(hover===i?"scale(1.2)":"scale(1)")}}
        >
          <path d="M10 1l2.5 5.5L18 7.5l-4 4 1 5.5L10 14.5 4.9 17l1-5.5-4-4 5.6-1z"
            fill={(hover||value)>=i?GOLD:CREAM+"20"}/>
        </svg>
      ))}
    </span>
  );
}

function Reviews(){
  const[reviews,setReviews]=useState([]);
  const[showAll,setShowAll]=useState(false);
  const[showForm,setShowForm]=useState(false);
  const[formName,setFormName]=useState("");
  const[formRating,setFormRating]=useState(0);
  const[formComment,setFormComment]=useState("");
  const[submitting,setSubmitting]=useState(false);
  const[submitted,setSubmitted]=useState(false);

  useEffect(()=>{
    (async()=>{
      try{
        const snap=await db.collection("reviews").orderBy("createdAt","desc").limit(50).get();
        setReviews(snap.docs.map(d=>({id:d.id,...d.data()})));
      }catch(e){console.error("Firestore read:",e)}
    })();
  },[submitted]);

  const avg=reviews.length?reviews.reduce((s,r)=>s+r.rating,0)/reviews.length:0;

  const handleSubmit=async(e)=>{
    e.preventDefault();
    if(!formName.trim()||!formRating||!formComment.trim())return;
    setSubmitting(true);
    try{
      await db.collection("reviews").add({
        name:formName.trim(),rating:formRating,comment:formComment.trim(),
        createdAt:firebase.firestore.FieldValue.serverTimestamp()
      });
      setFormName("");setFormRating(0);setFormComment("");
      setShowForm(false);setSubmitted(prev=>!prev);
    }catch(e){console.error("Firestore write:",e)}
    setSubmitting(false);
  };

  const displayed=showAll?reviews:reviews.slice(0,3);

  return(
    <section id="reviews" style={{padding:"60px 24px 80px",background:"linear-gradient(175deg,"+NAVY_MID+" 0%,"+NAVY+" 100%)",color:CREAM,position:"relative",zIndex:1}}>
      <div style={{maxWidth:800,margin:"0 auto",textAlign:"center"}}>
        <AnimatedSection>
          <span style={{color:GOLD,fontSize:11,fontWeight:700,letterSpacing:2.5,textTransform:"uppercase"}}>Avis Clients</span>
          <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:"clamp(24px,3.5vw,34px)",fontWeight:900,marginTop:8,marginBottom:20,color:CREAM}}>Ce qu'ils pensent de ML Padel</h2>

          {reviews.length>0&&(
            <div style={{display:"inline-flex",alignItems:"center",gap:14,background:CREAM+"08",border:"1px solid "+GOLD+"30",borderRadius:16,padding:"16px 28px",marginBottom:32}}>
              <span style={{fontSize:42,fontWeight:900,color:GOLD,lineHeight:1}}>{avg.toFixed(1)}</span>
              <div style={{textAlign:"left"}}>
                <StarDisplay rating={avg} size={18}/>
                <div style={{fontSize:12,color:CREAM+"60",marginTop:2}}>{reviews.length} avis</div>
              </div>
            </div>
          )}

          {displayed.length>0&&(
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(240px,1fr))",gap:16,marginBottom:24,textAlign:"left"}}>
              {displayed.map(r=>(
                <div key={r.id} style={{background:CREAM+"06",border:"1px solid "+CREAM+"10",borderRadius:14,padding:"20px",transition:"border-color 0.3s"}}
                  onMouseEnter={e=>e.currentTarget.style.borderColor=GOLD+"44"}
                  onMouseLeave={e=>e.currentTarget.style.borderColor=CREAM+"10"}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                    <span style={{fontWeight:700,fontSize:14,color:CREAM}}>{r.name}</span>
                    <StarDisplay rating={r.rating} size={13}/>
                  </div>
                  <p style={{fontSize:13,color:CREAM+"70",lineHeight:1.5,margin:0}}>{r.comment}</p>
                  {r.createdAt&&(<div style={{fontSize:11,color:CREAM+"30",marginTop:10}}>{new Date(r.createdAt.seconds*1000).toLocaleDateString("fr-FR",{day:"numeric",month:"short",year:"numeric"})}</div>)}
                </div>
              ))}
            </div>
          )}

          {reviews.length===0&&!showForm&&(<p style={{color:CREAM+"50",fontSize:14,marginBottom:24}}>Soyez le premier à laisser un avis !</p>)}

          <div style={{display:"flex",gap:12,justifyContent:"center",flexWrap:"wrap"}}>
            {reviews.length>3&&!showAll&&(
              <button onClick={()=>setShowAll(true)} style={{background:"transparent",border:"1px solid "+GOLD+"50",color:GOLD,padding:"12px 24px",borderRadius:50,fontSize:14,fontWeight:600,cursor:"pointer",transition:"all 0.3s"}}
                onMouseEnter={e=>{e.target.style.background=GOLD+"15";e.target.style.borderColor=GOLD}}
                onMouseLeave={e=>{e.target.style.background="transparent";e.target.style.borderColor=GOLD+"50"}}>
                Voir tous les avis ({reviews.length})
              </button>
            )}
            {showAll&&(<button onClick={()=>setShowAll(false)} style={{background:"transparent",border:"1px solid "+CREAM+"20",color:CREAM+"60",padding:"12px 24px",borderRadius:50,fontSize:14,fontWeight:600,cursor:"pointer"}}>Voir moins</button>)}
            <button onClick={()=>setShowForm(!showForm)} style={{
              background:showForm?"transparent":"linear-gradient(135deg,"+GOLD+","+GOLD_LIGHT+")",
              border:showForm?"1px solid "+CREAM+"20":"none",
              color:showForm?CREAM+"60":NAVY,
              padding:"12px 24px",borderRadius:50,fontSize:14,fontWeight:700,cursor:"pointer",
              transition:"all 0.3s",boxShadow:showForm?"none":"0 4px 20px "+GOLD+"30"
            }}>{showForm?"Annuler":"Laisser un avis"}</button>
          </div>

          {showForm&&(
            <form onSubmit={handleSubmit} style={{maxWidth:440,margin:"28px auto 0",textAlign:"left",background:CREAM+"06",border:"1px solid "+CREAM+"10",borderRadius:16,padding:24}}>
              <div style={{marginBottom:16}}>
                <label style={{fontSize:12,fontWeight:600,color:CREAM+"60",display:"block",marginBottom:6}}>Prénom</label>
                <input value={formName} onChange={e=>setFormName(e.target.value)} placeholder="Votre prénom"
                  style={{width:"100%",padding:"10px 14px",borderRadius:10,border:"1px solid "+CREAM+"15",background:CREAM+"06",color:CREAM,fontSize:14,outline:"none",boxSizing:"border-box"}}/>
              </div>
              <div style={{marginBottom:16}}>
                <label style={{fontSize:12,fontWeight:600,color:CREAM+"60",display:"block",marginBottom:6}}>Note</label>
                <StarInput value={formRating} onChange={setFormRating}/>
              </div>
              <div style={{marginBottom:20}}>
                <label style={{fontSize:12,fontWeight:600,color:CREAM+"60",display:"block",marginBottom:6}}>Commentaire</label>
                <textarea value={formComment} onChange={e=>setFormComment(e.target.value)} rows={3}
                  placeholder="Partagez votre expérience..."
                  style={{width:"100%",padding:"10px 14px",borderRadius:10,border:"1px solid "+CREAM+"15",background:CREAM+"06",color:CREAM,fontSize:14,outline:"none",resize:"vertical",fontFamily:"'DM Sans',sans-serif",boxSizing:"border-box"}}/>
              </div>
              <button type="submit" disabled={submitting||!formName.trim()||!formRating||!formComment.trim()} style={{
                width:"100%",padding:"12px",borderRadius:50,border:"none",
                background:(!formName.trim()||!formRating||!formComment.trim())?CREAM+"15":"linear-gradient(135deg,"+GOLD+","+GOLD_LIGHT+")",
                color:(!formName.trim()||!formRating||!formComment.trim())?CREAM+"30":NAVY,
                fontSize:14,fontWeight:700,cursor:submitting?"wait":"pointer",transition:"all 0.3s"
              }}>{submitting?"Envoi...":"Envoyer mon avis"}</button>
            </form>
          )}
        </AnimatedSection>
      </div>
    </section>
  );
}

/* ─── Scroll Progress Bar ─── */
function ScrollProgress(){
  useEffect(()=>{
    const bar=document.getElementById("scroll-progress");
    const onScroll=()=>{
      const h=document.documentElement.scrollHeight-window.innerHeight;
      bar.style.width=(window.scrollY/h*100)+"%";
    };
    window.addEventListener("scroll",onScroll);
    return()=>window.removeEventListener("scroll",onScroll);
  },[]);
  return <div id="scroll-progress"/>;
}

/* ─── Back to Top Button ─── */
function BackToTop(){
  const[visible,setVisible]=useState(false);
  useEffect(()=>{
    const fn=()=>setVisible(window.scrollY>600);
    window.addEventListener("scroll",fn);
    return()=>window.removeEventListener("scroll",fn);
  },[]);
  return(
    <button className={`back-to-top ${visible?"visible":""}`}
      onClick={()=>window.scrollTo({top:0,behavior:"smooth"})}
      aria-label="Retour en haut"
    >↑</button>
  );
}

/* ─── Animated Counter Hook ─── */
function useCounter(end,duration=2000,startOnView=false){
  const[count,setCount]=useState(0);
  const ref=useRef(null);
  const started=useRef(false);
  useEffect(()=>{
    if(!startOnView||started.current)return;
    const el=ref.current;if(!el)return;
    const obs=new IntersectionObserver(([e])=>{
      if(e.isIntersecting&&!started.current){
        started.current=true;
        const s=performance.now();
        const animate=(now)=>{
          const p=Math.min((now-s)/duration,1);
          const eased=1-Math.pow(1-p,3);
          setCount(Math.round(eased*end));
          if(p<1)requestAnimationFrame(animate);
        };
        requestAnimationFrame(animate);
      }
    },{threshold:0.3});
    obs.observe(el);
    return()=>obs.disconnect();
  },[end,duration,startOnView]);
  return[ref,count];
}
