function useInView(threshold=0.08){
  const ref=useRef(null);
  const[inView,setInView]=useState(false);
  useEffect(()=>{
    const el=ref.current;if(!el)return;
    const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting)setInView(true)},{threshold});
    obs.observe(el);return()=>obs.disconnect();
  },[threshold]);
  return[ref,inView];
}

function AnimatedSection({children,style={},delay=0}){
  const[ref,inView]=useInView();
  return(
    <div ref={ref} style={{
      opacity:inView?1:0,
      transform:inView?"translateY(0)":"translateY(40px)",
      transition:`all 0.9s cubic-bezier(0.16,1,0.3,1) ${delay}s`,
      ...style,
    }}>{children}</div>
  );
}

/* 脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙 Scroll Progress Bar 脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙 */
function ScrollProgress(){
  useEffect(()=>{
    const bar=document.getElementById("scroll-progress");
    const onScroll=()=>{
      const h=document.documentElement.scrollHeight-window.innerHeight;
      bar.style.width=(window.scrollY/h*100)+"%";
    };
    window.addEventListener("scroll",onScroll);
    return()=>window.removeEventListener("scroll",onScroll);
  },[]);
  return <div id="scroll-progress"/>;
}

/* 脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙 Back to Top Button 脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙 */
function BackToTop(){
  const[visible,setVisible]=useState(false);
  useEffect(()=>{
    const fn=()=>setVisible(window.scrollY>600);
    window.addEventListener("scroll",fn);
    return()=>window.removeEventListener("scroll",fn);
  },[]);
  return(
    <button className={`back-to-top ${visible?"visible":""}`}
      onClick={()=>window.scrollTo({top:0,behavior:"smooth"})}
      aria-label="Retour en haut"
    >脙垄脗聠脗聭</button>
  );
}

/* 脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙 Animated Counter Hook 脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙 */
function useCounter(end,duration=2000,startOnView=false){
  const[count,setCount]=useState(0);
  const ref=useRef(null);
  const started=useRef(false);
  useEffect(()=>{
    if(!startOnView||started.current)return;
    const el=ref.current;if(!el)return;
    const obs=new IntersectionObserver(([e])=>{
      if(e.isIntersecting&&!started.current){
        started.current=true;
        const s=performance.now();
        const animate=(now)=>{
          const p=Math.min((now-s)/duration,1);
          const eased=1-Math.pow(1-p,3);
          setCount(Math.round(eased*end));
          if(p<1)requestAnimationFrame(animate);
        };
        requestAnimationFrame(animate);
      }
    },{threshold:0.3});
    obs.observe(el);
    return()=>obs.disconnect();
  },[end,duration,startOnView]);
  return[ref,count];
}
