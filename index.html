/* ─── Hooks ─── */
function useInView(threshold=0.08){
  const ref=useRef(null);
  const[inView,setInView]=useState(false);
  useEffect(()=>{
    const el=ref.current;if(!el)return;
    const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting)setInView(true)},{threshold});
    obs.observe(el);return()=>obs.disconnect();
  },[threshold]);
  return[ref,inView];
}

function AnimatedSection({children,style={},delay=0}){
  const[ref,inView]=useInView();
  return(
    <div ref={ref} style={{
      opacity:inView?1:0,
      transform:inView?"translateY(0)":"translateY(40px)",
      transition:`all 0.9s cubic-bezier(0.16,1,0.3,1) ${delay}s`,
      ...style,
    }}>{children}</div>
  );
}

/* ─── Mon Wallet — Espace Client ─── */
function WalletClient(){
  const WALLET_API="https://script.google.com/macros/s/AKfycbzox1toN9GY7dMob2NP71ldDNYM93ZRzcTo4M4zTae8RjAk9tqs8bvuStNsedltQ3pibw/exec";
  const[phone,setPhone]=useState("");
  const[client,setClient]=useState(null);
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState("");
  const[success,setSuccess]=useState("");
  const[prestation,setPrestation]=useState("indiv");
  const[dateRes,setDateRes]=useState("");
  const[creneau,setCreneau]=useState("");
  const[booking,setBooking]=useState(false);

  const prestations=[
    {key:"indiv",label:"Cours individuel 1h",credits:55},
    {key:"duo",label:"Collectif Duo 1h (/pers.)",credits:35},
    {key:"trio",label:"Collectif Trio 1h (/pers.)",credits:25},
    {key:"quatuor",label:"Collectif Quatuor 1h (/pers.)",credits:20},
    {key:"stage",label:"Stage vacances",credits:150},
    {key:"masterclass4",label:"Masterclass WE 4j",credits:100},
    {key:"masterclass8",label:"Masterclass WE 8j",credits:80},
  ];

  const checkBalance=async()=>{
    if(!phone||phone.length<10){setError("Entrez un numéro valide");return}
    if(!WALLET_API){setError("Système wallet en cours de configuration");return}
    setLoading(true);setError("");setClient(null);setSuccess("");
    try{
      const r=await fetch(WALLET_API+"?action=balance&phone="+encodeURIComponent(phone));
      const d=await r.json();
      if(d.success)setClient(d.client);
      else setError(d.error||"Wallet non trouvé");
    }catch(err){setError("Erreur de connexion")}
    setLoading(false);
  };

  const bookWithWallet=async()=>{
    if(!client||!dateRes){setError("Sélectionnez une date");return}
    if(!WALLET_API){setError("Système wallet en cours de configuration");return}
    const p=prestations.find(x=>x.key===prestation);
    if(client.solde<p.credits){setError("Solde insuffisant ("+client.solde.toFixed(1)+" cr. < "+p.credits+" cr.)");return}
    setBooking(true);setError("");setSuccess("");
    try{
      const r=await fetch(WALLET_API,{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({action:"debit",phone,prestation,date:dateRes,creneau,nbPersonnes:1})});
      const d=await r.json();
      if(d.success){
        setSuccess("Réservation confirmée ! "+p.label+" — "+d.debit+" cr. débités. Nouveau solde : "+d.nouveauSolde.toFixed(1)+" cr.");
        setClient({...client,solde:d.nouveauSolde});
      }else setError(d.error||"Erreur lors de la réservation");
    }catch(err){setError("Erreur de connexion")}
    setBooking(false);
  };

  const selectedP=prestations.find(x=>x.key===prestation);

  return(
    <section style={{padding:"60px 24px 0",background:`linear-gradient(175deg,${NAVY} 0%,${NAVY_MID} 100%)`,position:"relative",zIndex:1}}>
      <div style={{maxWidth:700,margin:"0 auto"}}>
        <AnimatedSection>
          <div style={{
            background:`${CREAM}06`,borderRadius:20,border:`1.5px solid ${GOLD}25`,
            padding:"32px 28px",boxShadow:`0 8px 32px ${GOLD}10`,
          }}>
            <div style={{textAlign:"center",marginBottom:24}}>
              <span style={{color:GOLD,fontSize:11,fontWeight:700,letterSpacing:2.5,textTransform:"uppercase"}}>
                Espace client
              </span>
              <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:900,marginTop:6,color:CREAM}}>
                Mon <span style={{color:GOLD}}>Wallet</span>
              </h3>
              <p style={{fontSize:13,color:`${CREAM}55`,marginTop:6}}>
                Consultez votre solde et réservez directement avec vos crédits
              </p>
            </div>

            {/* Lookup par téléphone */}
            <div style={{display:"flex",gap:10,marginBottom:16}}>
              <input
                type="tel" placeholder="Votre n° de téléphone (ex: 0692...)"
                value={phone} onChange={e=>setPhone(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&checkBalance()}
                style={{
                  flex:1,padding:"14px 18px",borderRadius:12,border:`1.5px solid ${GOLD}30`,
                  background:`${CREAM}08`,color:CREAM,fontSize:15,fontFamily:"'DM Sans',sans-serif",
                  outline:"none",
                }}
              />
              <button onClick={checkBalance} disabled={loading} style={{
                padding:"14px 24px",borderRadius:12,border:"none",cursor:"pointer",
                background:`linear-gradient(135deg,${GOLD},${GOLD_LIGHT})`,color:NAVY,
                fontWeight:700,fontSize:14,fontFamily:"'DM Sans',sans-serif",
                opacity:loading?0.6:1,transition:"all 0.3s",whiteSpace:"nowrap",
              }}>
                {loading?"...":"Consulter"}
              </button>
            </div>

            {error&&<div style={{background:"#ff4444 18",border:"1px solid #ff444444",borderRadius:10,padding:"10px 14px",marginBottom:14,color:"#ff6666",fontSize:13}}>{error}</div>}
            {success&&<div style={{background:`${GOLD}15`,border:`1px solid ${GOLD}33`,borderRadius:10,padding:"10px 14px",marginBottom:14,color:GOLD,fontSize:13,fontWeight:600}}>{success}</div>}

            {/* Résultat client */}
            {client&&(
              <div style={{marginTop:8}}>
                <div style={{
                  display:"flex",justifyContent:"space-between",alignItems:"center",
                  padding:"18px 20px",borderRadius:14,
                  background:`${GOLD}10`,border:`1px solid ${GOLD}22`,marginBottom:20,
                }}>
                  <div>
                    <div style={{fontSize:15,fontWeight:700,color:CREAM}}>{client.prenom} {client.nom}</div>
                    <div style={{fontSize:12,color:`${CREAM}50`,marginTop:2}}>ID : {client.id}</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontFamily:"'Playfair Display',serif",fontSize:28,fontWeight:900,color:GOLD}}>
                      {client.solde.toFixed(1)}
                    </div>
                    <div style={{fontSize:11,color:`${CREAM}50`}}>crédits disponibles</div>
                  </div>
                </div>

                {/* Formulaire de réservation */}
                <div style={{borderTop:`1px solid ${CREAM}10`,paddingTop:20}}>
                  <h4 style={{fontSize:14,fontWeight:700,color:CREAM,marginBottom:14}}>
                    Réserver avec mes crédits
                  </h4>

                  {/* Choix prestation */}
                  <div style={{marginBottom:12}}>
                    <label style={{fontSize:12,color:`${CREAM}50`,display:"block",marginBottom:6}}>Prestation</label>
                    <select value={prestation} onChange={e=>setPrestation(e.target.value)} style={{
                      width:"100%",padding:"12px 14px",borderRadius:10,
                      border:`1.5px solid ${GOLD}25`,background:`${CREAM}06`,
                      color:CREAM,fontSize:14,fontFamily:"'DM Sans',sans-serif",
                      outline:"none",appearance:"none",
                    }}>
                      {prestations.map(p=>(
                        <option key={p.key} value={p.key} style={{background:NAVY,color:CREAM}}>
                          {p.label} — {p.credits} cr.
                        </option>
                      ))}
                    </select>
                  </div>

                  {/* Date + créneau */}
                  <div style={{display:"flex",gap:10,marginBottom:12}}>
                    <div style={{flex:1}}>
                      <label style={{fontSize:12,color:`${CREAM}50`,display:"block",marginBottom:6}}>Date souhaitée</label>
                      <input type="date" value={dateRes} onChange={e=>setDateRes(e.target.value)} style={{
                        width:"100%",padding:"12px 14px",borderRadius:10,
                        border:`1.5px solid ${GOLD}25`,background:`${CREAM}06`,
                        color:CREAM,fontSize:14,fontFamily:"'DM Sans',sans-serif",outline:"none",
                      }}/>
                    </div>
                    <div style={{flex:1}}>
                      <label style={{fontSize:12,color:`${CREAM}50`,display:"block",marginBottom:6}}>Créneau (optionnel)</label>
                      <input type="text" placeholder="ex: 9h-10h" value={creneau} onChange={e=>setCreneau(e.target.value)} style={{
                        width:"100%",padding:"12px 14px",borderRadius:10,
                        border:`1.5px solid ${GOLD}25`,background:`${CREAM}06`,
                        color:CREAM,fontSize:14,fontFamily:"'DM Sans',sans-serif",outline:"none",
                      }}/>
                    </div>
                  </div>

                  {/* Récap + bouton */}
                  <div style={{
                    display:"flex",justifyContent:"space-between",alignItems:"center",
                    padding:"14px 18px",borderRadius:12,background:`${CREAM}04`,
                    marginBottom:14,
                  }}>
                    <span style={{fontSize:13,color:`${CREAM}60`}}>Coût : <strong style={{color:GOLD}}>{selectedP.credits} cr.</strong></span>
                    <span style={{fontSize:13,color:`${CREAM}60`}}>Solde après : <strong style={{color:client.solde>=selectedP.credits?GOLD:"#ff6666"}}>{(client.solde-selectedP.credits).toFixed(1)} cr.</strong></span>
                  </div>

                  <button onClick={bookWithWallet} disabled={booking||client.solde<selectedP.credits||!dateRes} style={{
                    width:"100%",padding:"16px",borderRadius:14,border:"none",cursor:"pointer",
                    background:client.solde>=selectedP.credits&&dateRes?`linear-gradient(135deg,${GOLD},${GOLD_LIGHT})`:`${CREAM}15`,
                    color:client.solde>=selectedP.credits&&dateRes?NAVY:`${CREAM}30`,
                    fontWeight:700,fontSize:15,fontFamily:"'DM Sans',sans-serif",
                    transition:"all 0.3s",opacity:booking?0.6:1,
                  }}>
                    {booking?"Réservation en cours...":client.solde<selectedP.credits?"Solde insuffisant":"Réserver et débiter "+selectedP.credits+" crédits"}
                  </button>
                </div>
              </div>
            )}

            {/* Exclusions */}
            <div style={{marginTop:20,padding:"14px 16px",borderRadius:12,background:`${CREAM}03`,border:`1px solid ${CREAM}08`}}>
              <div style={{fontSize:12,fontWeight:700,color:`${CREAM}45`,marginBottom:8}}>Crédits utilisables sur :</div>
              <div style={{fontSize:12,color:`${CREAM}35`,lineHeight:1.8}}>
                ✓ Cours individuels à l'unité &middot; ✓ Cours collectifs à l'unité &middot; ✓ Stages vacances &middot; ✓ Masterclass week-end

              </div>
            </div>
          </div>
        </AnimatedSection>
      </div>
    </section>
  );
}
