/* âââ Hooks âââ */
function useInView(threshold=0.08){
  const ref=useRef(null);
  const[inView,setInView]=useState(false);
  useEffect(()=>{
    const el=ref.current;if(!el)return;
    const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting)setInView(true)},{threshold});
    obs.observe(el);return()=>obs.disconnect();
  },[threshold]);
  return[ref,inView];
}

function AnimatedSection({children,style={},delay=0}){
  const[ref,inView]=useInView();
  return(
    <div ref={ref} style={{
      opacity:inView?1:0,
      transform:inView?"translateY(0)":"translateY(40px)",
      transition:`all 0.9s cubic-bezier(0.16,1,0.3,1) ${delay}s`,
      ...style,
    }}>{children}</div>
  );
}

function WalletClient(){

  const[email,setEmail]=useState("");
  const[otp,setOtp]=useState("");
  const[otpSent,setOtpSent]=useState(false);
  const[client,setClient]=useState(null);
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState("");
  const[success,setSuccess]=useState("");

  const[type,setType]=useState("indiv");
  const[duree,setDuree]=useState("1h");
  const[booking,setBooking]=useState(false);
  const[calcomDone,setCalcomDone]=useState(false);
  const[reserved,setReserved]=useState(false);

  const[showHistory,setShowHistory]=useState(false);

  const[loadingHist,setLoadingHist]=useState(false);

  const types=[
    {key:"indiv",label:"Individuel",base:55,calcom:CALCOM.indivWallet,hasDuree:true},

    {key:"trio",label:"Trio (3 joueurs)",base:25,calcom:CALCOM.collectifTrioWallet,hasDuree:true,perPers:true},
    {key:"quatuor",label:"Quatuor (4 joueurs)",base:20,calcom:CALCOM.collectifQuatuorWallet,hasDuree:true,perPers:true},
    {key:"stage",label:"Stage vacances",base:150,calcom:CALCOM.stageWallet,hasDuree:false},

  ];
  const durees=[{key:"1h",label:"1h",mult:1},{key:"1h30",label:"1h30",mult:1.5},{key:"2h",label:"2h",mult:2}];

  const sel=types.find(t=>t.key===type);
  const selD=durees.find(d=>d.key===duree);
  const credits=sel.hasDuree?Math.floor(sel.base*selD.mult):sel.base;
  const prestationKey=sel.hasDuree?type+"_"+duree:type;
  const prestationLabel=sel.label+(sel.hasDuree?" "+selD.label:"")+(sel.perPers?" /pers.":"");

  const sendOtp=async()=>{
    if(!email||!email.includes("@")){setError("Entrez un email valide");return}

      const r=await fetch(WALLET_API,{method:"POST",body:JSON.stringify({action:"sendOtp",email})});

      if(d.success){setOtpSent(true);setError("")}
      else setError(d.error||"Erreur")
    }catch(err){setError("Erreur de connexion")}
    setLoading(false);

      const d=await r.json();
      if(d.success){setClient(d.client);setError("")}
      else setError(d.error||"Code invalide")
    }catch(err){setError("Erreur de connexion")}
    setLoading(false);
  };

  const fetchHistory=async()=>{
    if(showHistory){setShowHistory(false);return}
    setLoadingHist(true);
    try{
      const r=await fetch(WALLET_API,{method:"POST",body:JSON.stringify({action:"history",email})});
      const d=await r.json();
      if(d.success){setHistory(d.history||[]);setShowHistory(true);if(d.client)setClient(prev=>({...prev,solde:d.client.solde}))}
    }catch(err){}
    setLoadingHist(false);
  };

  const bookWithWallet=async()=>{
    if(!client){setError("Client non connectÃ©");return}
    if(client.solde<credits){setError("Solde insuffisant ("+client.solde.toFixed(1)+" cr. < "+credits+" cr.)");return}
    setBooking(true);setError("");setSuccess("");
    var today=new Date().toISOString().split("T")[0];

        body:JSON.stringify({action:"debit",email:email,prestation:prestationKey,date:today,creneau:"",nbPersonnes:1})});
      const d=await r.json();
      if(d.success){
        setSuccess("RÃ©servation confirmÃ©e ! "+prestationLabel+" â "+d.debit+" cr. dÃ©bitÃ©s. Nouveau solde : "+d.nouveauSolde.toFixed(1)+" cr.");
        setClient({...client,solde:d.nouveauSolde});
        setCalcomDone(false);
        setReserved(true);
      }else setError(d.error||"Erreur lors du dÃ©bit");
    }catch(err){setError("Erreur de connexion")}
    setBooking(false);
  };

  const disconnect=()=>{setClient(null);setOtpSent(false);setOtp("");setEmail("");setError("");setSuccess("");setShowHistory(false);setHistory([]);setCalcomDone(false);setReserved(false)};

  const inputStyle={width:"100%",padding:"12px 14px",borderRadius:10,border:"1.5px solid "+GOLD+"25",background:CREAM+"06",color:CREAM,fontSize:14,fontFamily:"'DM Sans',sans-serif",outline:"none"};

  return(
    <section style={{padding:"60px 24px 0",background:"linear-gradient(175deg,"+NAVY+" 0%,"+NAVY_MID+" 100%)",position:"relative",zIndex:1}}>
      <div style={{maxWidth:700,margin:"0 auto"}}>
        <AnimatedSection>
          <div style={{
            background:CREAM+"06",borderRadius:20,border:"1.5px solid "+GOLD+"25",
            padding:"32px 28px",boxShadow:"0 8px 32px "+GOLD+"10",
          }}>
            <div style={{textAlign:"center",marginBottom:24}}>
              <span style={{color:GOLD,fontSize:11,fontWeight:700,letterSpacing:2.5,textTransform:"uppercase"}}>

/* âââ Scroll Progress Bar âââ */
function ScrollProgress(){
  useEffect(()=>{
    const bar=document.getElementById("scroll-progress");
    const onScroll=()=>{
      const h=document.documentElement.scrollHeight-window.innerHeight;
      bar.style.width=(window.scrollY/h*100)+"%";
    };
    window.addEventListener("scroll",onScroll);
    return()=>window.removeEventListener("scroll",onScroll);
  },[]);
  return <div id="scroll-progress"/>;
}

/* âââ Back to Top Button âââ */
function BackToTop(){
  const[visible,setVisible]=useState(false);
  useEffect(()=>{
    const fn=()=>setVisible(window.scrollY>600);
    window.addEventListener("scroll",fn);
    return()=>window.removeEventListener("scroll",fn);
  },[]);
  return(
    <button className={`back-to-top ${visible?"visible":""}`}
      onClick={()=>window.scrollTo({top:0,behavior:"smooth"})}
      aria-label="Retour en haut"
    >â</button>
  );
}

/* âââ Animated Counter Hook âââ */
function useCounter(end,duration=2000,startOnView=false){
  const[count,setCount]=useState(0);
  const ref=useRef(null);
  const started=useRef(false);
  useEffect(()=>{
    if(!startOnView||started.current)return;
    const el=ref.current;if(!el)return;
    const obs=new IntersectionObserver(([e])=>{
      if(e.isIntersecting&&!started.current){
        started.current=true;
        const s=performance.now();
        const animate=(now)=>{
          const p=Math.min((now-s)/duration,1);
          const eased=1-Math.pow(1-p,3);
          setCount(Math.round(eased*end));
          if(p<1)requestAnimationFrame(animate);
        };
        requestAnimationFrame(animate);
      }
    },{threshold:0.3});
    obs.observe(el);
    return()=>obs.disconnect();
  },[end,duration,startOnView]);
  return[ref,count];
}

  overlay.addEventListener("click",function(ev){if(ev.target===overlay)overlay.classList.remove("open")});
})();
</script>


<!-- Scroll Reveal Animations -->
<script>
(function(){
  setTimeout(function(){
    var ids=['tarifs','wallet','galerie','cours-collectifs','boutique','faq','contact','reviews','\u00e9v\u00e9nements'];
    var transforms=['translateX(-40px)','translateX(40px)','translateY(40px)'];
    var animated=[];
    ids.forEach(function(id,i){
      var el=document.getElementById(id);
      if(!el)return;
      var rect=el.getBoundingClientRect();
      if(rect.top<window.innerHeight&&rect.bottom>0)return;
      el.style.opacity='0';
      el.style.transform=transforms[i%3];
      el.offsetHeight;
      el.style.transition='opacity 0.7s ease,transform 0.7s ease';
      animated.push(el);
    });
    var obs=new IntersectionObserver(function(entries){
      entries.forEach(function(e){
        if(e.isIntersecting){
          e.target.style.opacity='1';
          e.target.style.transform='translate(0,0)';
          obs.unobserve(e.target);
        }
      });
    },{threshold:0.1,rootMargin:'0px 0px -40px 0px'});
    animated.forEach(function(el){obs.observe(el)});
  },2000);
})();
</script>

<script>
(function() {
  document.addEventListener("click", function(e) {
    var link = e.target.closest("a");
    if (!link) return;
    var href = link.getAttribute("href") || "";
    if (href.indexOf("cal.com") !== -1) {
      gtag("event", "clic_reserver", { event_category: "conversion", event_label: href });
    }
    if (href.indexOf("wa.me") !== -1) {
      gtag("event", "clic_whatsapp", { event_category: "conversion", event_label: "WhatsApp" });
    }
    if (href === "#wallet") {
      gtag("event", "acces_wallet", { event_category: "engagement", event_label: "Navigation Wallet" });
    }
    if (href.indexOf("pallap") !== -1) {
      gtag("event", "clic_boutique", { event_category: "engagement", event_label: href });
    }
  });
  var sections = ["tarifs","wallet","galerie","avis","academie","contact"];
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        gtag("event", "section_vue", { event_category: "engagement", event_label: entry.target.id });
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.3 });
  setTimeout(function() {
    sections.forEach(function(id) {
      var el = document.getElementById(id);
      if (el) observer.observe(el);
    });
  }, 2000);
})();
</script>
