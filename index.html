/* ─── Hooks ─── */
function useInView(threshold=0.08){
  const ref=useRef(null);
  const[inView,setInView]=useState(false);
  useEffect(()=>{
    const el=ref.current;if(!el)return;
    const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting)setInView(true)},{threshold});
    obs.observe(el);return()=>obs.disconnect();
  },[threshold]);
  return[ref,inView];
}

function AnimatedSection({children,style={},delay=0,direction="up"}){
  const[ref,inView]=useInView();
  const transforms={
    up:"translateY(40px)",
    down:"translateY(-40px)",
    left:"translateX(-40px)",
    right:"translateX(40px)",
    scale:"scale(0.92)",
  };
  return(
    <div ref={ref} style={{
      opacity:inView?1:0,
      transform:inView?"none":transforms[direction]||transforms.up,
      transition:`all 0.9s cubic-bezier(0.16,1,0.3,1) ${delay}s`,
      ...style,
    }}>{children}</div>
  );
}

/* ─── Carousel Component ─── */
function Carousel({children,itemWidth=320,gap=18,showArrows=true,showDots=true}){
  const trackRef=useRef(null);
  const[current,setCurrent]=useState(0);
  const count=React.Children.count(children);

  const scrollTo=(idx)=>{
    const track=trackRef.current;if(!track)return;
    const target=idx*(itemWidth+gap);
    track.scrollTo({left:target,behavior:"smooth"});
    setCurrent(idx);
  };

  const handleScroll=()=>{
    const track=trackRef.current;if(!track)return;
    const idx=Math.round(track.scrollLeft/(itemWidth+gap));
    setCurrent(Math.min(idx,count-1));
  };

  return(
    <div style={{position:"relative"}}>
      <div ref={trackRef} onScroll={handleScroll} className="carousel-track" style={{
        display:"flex",gap,overflowX:"auto",scrollSnapType:"x mandatory",
        WebkitOverflowScrolling:"touch",scrollbarWidth:"none",
        msOverflowStyle:"none",paddingBottom:8,paddingLeft:8,paddingRight:8,
      }}>
        <style>{`.carousel-track::-webkit-scrollbar{display:none}`}</style>
        {React.Children.map(children,(child,i)=>(
          <div key={i} className="carousel-slide" style={{
            minWidth:itemWidth,maxWidth:itemWidth,scrollSnapAlign:"center",flexShrink:0,
          }}>{child}</div>
        ))}
      </div>

      {showArrows&&count>1&&(
        <div className="carousel-arrows" style={{display:"none",position:"absolute",top:"50%",left:-18,right:-18,transform:"translateY(-50%)",justifyContent:"space-between",pointerEvents:"none"}}>
          <button onClick={()=>scrollTo(Math.max(0,current-1))} style={{
            width:40,height:40,borderRadius:"50%",border:`2px solid ${GOLD}40`,background:`${WHITE}ee`,
            cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",
            pointerEvents:"auto",transition:"all 0.3s",boxShadow:`0 4px 15px rgba(0,0,0,0.1)`,
          }}
          onMouseEnter={e=>{e.currentTarget.style.background=GOLD;e.currentTarget.style.color=NAVY}}
          onMouseLeave={e=>{e.currentTarget.style.background=`${WHITE}ee`;e.currentTarget.style.color=TEXT_DARK}}
          >
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <button onClick={()=>scrollTo(Math.min(count-1,current+1))} style={{
            width:40,height:40,borderRadius:"50%",border:`2px solid ${GOLD}40`,background:`${WHITE}ee`,
            cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",
            pointerEvents:"auto",transition:"all 0.3s",boxShadow:`0 4px 15px rgba(0,0,0,0.1)`,
          }}
          onMouseEnter={e=>{e.currentTarget.style.background=GOLD;e.currentTarget.style.color=NAVY}}
          onMouseLeave={e=>{e.currentTarget.style.background=`${WHITE}ee`;e.currentTarget.style.color=TEXT_DARK}}
          >
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>
      )}

      {showDots&&count>1&&(
        <div style={{display:"flex",justifyContent:"center",gap:6,marginTop:16}}>
          {Array.from({length:count}).map((_,i)=>(
            <button key={i} onClick={()=>scrollTo(i)} style={{
              width:current===i?24:8,height:8,borderRadius:4,border:"none",
              background:current===i?GOLD:`${GOLD}30`,cursor:"pointer",
              transition:"all 0.3s",
            }}/>
          ))}
        </div>
      )}
    </div>
  );
}

  const[otp,setOtp]=useState("");
  const[maskedEmail,setMaskedEmail]=useState("");
  const[client,setClient]=useState(null);
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState("");
  const[success,setSuccess]=useState("");
  const[prestation,setPrestation]=useState("indiv");
  const[dateRes,setDateRes]=useState("");

  const[booking,setBooking]=useState(false);
  const[cooldown,setCooldown]=useState(0);
  const[history,setHistory]=useState([]);

  useEffect(()=>{
    if(cooldown<=0)return;
    const t=setTimeout(()=>setCooldown(c=>c-1),1000);
    return()=>clearTimeout(t);
  },[cooldown]);

  const prestations=[
    {key:"indiv",label:"Cours individuel 1h",credits:55},
    {key:"duo",label:"Collectif Duo 1h (/pers.)",credits:35},
    {key:"trio",label:"Collectif Trio 1h (/pers.)",credits:25},

    {key:"masterclass4",label:"Masterclass WE 4j",credits:100},
    {key:"masterclass8",label:"Masterclass WE 8j",credits:80},
  ];

  const sendOtp=async()=>{
    if(!email||!email.includes("@")){setError("Entrez un email valide");return}
    setLoading(true);setError("");
    try{
      const r=await fetch(WALLET_API+"?action=sendOtp&email="+encodeURIComponent(email));
      const d=await r.json();
      if(d.success){
        setMaskedEmail(d.maskedEmail||"");
        setStep("otp");
        setCooldown(60);
        setError("");
      }else{
        setError(d.error||"Erreur lors de l'envoi du code");
      }
    }catch(err){setError("Erreur de connexion")}
    setLoading(false);
  };

  const verifyOtp=async()=>{
    if(!otp||otp.length<6){setError("Entrez le code à 6 chiffres");return}
    setLoading(true);setError("");
    try{
            const r=await fetch(WALLET_API+"?action=verifyOtp&email="+encodeURIComponent(email)+"&otp="+encodeURIComponent(otp));
      const d=await r.json();
      if(d.success){
        setClient(d.client);
        setStep("wallet");
        setError("");
        // Fetch transaction history
        try{
          const rh=await fetch(WALLET_API+"?action=history&email="+encodeURIComponent(email));
          const dh=await rh.json();
          if(dh.success) setHistory(dh.history||[]);
        }catch(e){}
      }else{
        setError(d.error||"Code invalide");
      }
    }catch(err){setError("Erreur de connexion")}
    setLoading(false);
  };

  const resendOtp=async()=>{
    if(cooldown>0)return;

  const bookWithWallet=async()=>{
    if(!client||!dateRes){setError("Sélectionnez une date");return}
    const p=prestations.find(x=>x.key===prestation);
    if(client.solde<p.credits){setError("Solde insuffisant ("+client.solde.toFixed(1)+" cr. < "+p.credits+" cr.)");return}
    setBooking(true);setError("");setSuccess("");
    try{
      const r=await fetch(WALLET_API,{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({action:"debit",email,prestation,date:dateRes,creneau})});
      const d=await r.json();
      if(d.success){
        setSuccess("Réservation confirmée ! "+p.label+" — "+d.debit+" cr. débités. Nouveau solde : "+d.nouveauSolde.toFixed(1)+" cr.");
        setClient({...client,solde:d.nouveauSolde});
      }else setError(d.error||"Erreur lors de la réservation");
    }catch(err){setError("Erreur de connexion")}
    setBooking(false);
  };

  const logout=()=>{
    setStep("email");setClient(null);setOtp("");
    setError("");setSuccess("");setMaskedEmail("");
  };

  const selectedP=prestations.find(x=>x.key===prestation);

  const inputStyle={
    width:"100%",padding:"14px 18px",borderRadius:12,
    border:`1.5px solid ${GOLD}30`,background:`${CREAM}08`,
    color:CREAM,fontSize:15,fontFamily:"'DM Sans',sans-serif",outline:"none",
  };
  const btnPrimary={
    padding:"14px 24px",borderRadius:12,border:"none",cursor:"pointer",
    background:`linear-gradient(135deg,${GOLD},${GOLD_LIGHT})`,color:NAVY,
    fontWeight:700,fontSize:14,fontFamily:"'DM Sans',sans-serif",
    transition:"all 0.3s",whiteSpace:"nowrap",
  };

  return(
    <section style={{padding:"60px 24px 0",background:`linear-gradient(175deg,${NAVY} 0%,${NAVY_MID} 100%)`,position:"relative",zIndex:1}}>
      <div style={{maxWidth:700,margin:"0 auto"}}>
        <AnimatedSection>
          <div style={{background:`${CREAM}06`,borderRadius:20,border:`1.5px solid ${GOLD}25`,padding:"32px 28px",boxShadow:`0 8px 32px ${GOLD}10`}}>
            <div style={{textAlign:"center",marginBottom:24}}>
              <span style={{color:GOLD,fontSize:11,fontWeight:700,letterSpacing:2.5,textTransform:"uppercase"}}>Espace client sécurisé</span>
              <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:900,marginTop:6,color:CREAM}}>Mon <span style={{color:GOLD}}>Wallet</span></h3>
              <p style={{fontSize:13,color:`${CREAM}55`,marginTop:6}}>
                {step==="email"?"Entrez votre email pour recevoir un code de vérification":
                 step==="otp"?"Entrez le code reçu par email":
                 "Bienvenue "+client?.prenom+" !"}
              </p>
            </div>

            {/* Indicateur d'étapes */}
            <div style={{display:"flex",justifyContent:"center",gap:8,marginBottom:24}}>
              {["Email","Vérification","Wallet"].map((label,i)=>{
                const stepIdx=step==="email"?0:step==="otp"?1:2;
                const isActive=i<=stepIdx;
                return(
                  <div key={i} style={{display:"flex",alignItems:"center",gap:6}}>
                    <div style={{
                      width:24,height:24,borderRadius:"50%",
                      background:isActive?`linear-gradient(135deg,${GOLD},${GOLD_LIGHT})`:`${CREAM}12`,
                      display:"flex",alignItems:"center",justifyContent:"center",
                      fontSize:11,fontWeight:700,color:isActive?NAVY:`${CREAM}30`,transition:"all 0.3s",
                    }}>{i+1}</div>
                    <span style={{fontSize:11,color:isActive?GOLD:`${CREAM}25`,fontWeight:600,transition:"all 0.3s"}}>{label}</span>
                    {i<2&&<div style={{width:20,height:1,background:`${CREAM}15`,margin:"0 2px"}}/>}
                  </div>
                );
              })}
            </div>

            {error&&<div style={{background:"#ff444418",border:"1px solid #ff444444",borderRadius:10,padding:"10px 14px",marginBottom:14,color:"#ff6666",fontSize:13}}>{error}</div>}
            {success&&<div style={{background:`${GOLD}15`,border:`1px solid ${GOLD}33`,borderRadius:10,padding:"10px 14px",marginBottom:14,color:GOLD,fontSize:13,fontWeight:600}}>{success}</div>}

            {/* ═══ STEP 1 : Email ═══ */}
            {step==="email"&&(
              <div>
                <div style={{display:"flex",gap:10,marginBottom:16}}>
                  <input
                    type="email" placeholder="Votre adresse email"
                    value={email} onChange={e=>setEmail(e.target.value)}
                    onKeyDown={e=>e.key==="Enter"&&sendOtp()}
                    style={{...inputStyle,flex:1}}
                  />
                  <button onClick={sendOtp} disabled={loading} style={{...btnPrimary,opacity:loading?0.6:1}}>
                    {loading?"Envoi...":"Recevoir le code"}
                  </button>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8,padding:"12px 16px",borderRadius:10,background:`${CREAM}04`,border:`1px solid ${CREAM}08`}}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={GOLD} strokeWidth="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                  <span style={{fontSize:12,color:`${CREAM}40`}}>Un code de vérification sera envoyé à votre email</span>
                </div>
              </div>
            )}

            {/* ═══ STEP 2 : Code OTP ═══ */}
            {step==="otp"&&(
              <div>
                <div style={{textAlign:"center",marginBottom:16}}>
                  <div style={{display:"inline-flex",alignItems:"center",gap:8,background:`${GOLD}12`,border:`1px solid ${GOLD}25`,borderRadius:10,padding:"10px 16px"}}>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={GOLD} strokeWidth="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                    <span style={{fontSize:13,color:CREAM}}>Code envoyé à <strong style={{color:GOLD}}>{maskedEmail}</strong></span>
                  </div>
                </div>
                <div style={{display:"flex",gap:10,marginBottom:12}}>
                  <input
                    type="text" placeholder="Code à 6 chiffres"
                    value={otp} onChange={e=>setOtp(e.target.value.replace(/\D/g,'').slice(0,6))}
                    onKeyDown={e=>e.key==="Enter"&&verifyOtp()}
                    maxLength={6}
                    style={{...inputStyle,flex:1,textAlign:"center",fontSize:24,letterSpacing:8,fontWeight:800}}
                  />
                  <button onClick={verifyOtp} disabled={loading||otp.length<6} style={{...btnPrimary,opacity:loading||otp.length<6?0.5:1}}>
                    {loading?"...":"Vérifier"}
                  </button>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:8}}>
                  <button onClick={()=>{setStep("email");setOtp("");setError("")}} style={{background:"none",border:"none",color:`${CREAM}40`,fontSize:12,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>
                    ← Changer d'email
                  </button>
                  <button onClick={resendOtp} disabled={cooldown>0} style={{background:"none",border:"none",color:cooldown>0?`${CREAM}25`:GOLD,fontSize:12,cursor:cooldown>0?"default":"pointer",fontFamily:"'DM Sans',sans-serif",fontWeight:600}}>
                    {cooldown>0?"Renvoyer dans "+cooldown+"s":"Renvoyer le code"}
                  </button>
                </div>
              </div>
            )}

            {/* ═══ STEP 3 : Wallet authentifié ═══ */}
            {step==="wallet"&&client&&(
              <div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"18px 20px",borderRadius:14,background:`${GOLD}10`,border:`1px solid ${GOLD}22`,marginBottom:20}}>
                  <div>
                    <div style={{fontSize:15,fontWeight:700,color:CREAM}}>{client.prenom} {client.nom}</div>
                    <div style={{fontSize:12,color:`${CREAM}50`,marginTop:2}}>{client.email}</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontFamily:"'Playfair Display',serif",fontSize:28,fontWeight:900,color:GOLD}}>{client.solde.toFixed(1)}</div>
                    <div style={{fontSize:11,color:`${CREAM}50`}}>crédits disponibles</div>
                  </div>
                </div>

                <div style={{borderTop:`1px solid ${CREAM}10`,paddingTop:20}}>
                  <h4 style={{fontSize:14,fontWeight:700,color:CREAM,marginBottom:14}}>Réserver avec mes crédits</h4>
                  <div style={{marginBottom:12}}>
                    <label style={{fontSize:12,color:`${CREAM}50`,display:"block",marginBottom:6}}>Prestation</label>
                    <select value={prestation} onChange={e=>setPrestation(e.target.value)} style={{...inputStyle,appearance:"none"}}>
                      {prestations.map(p=><option key={p.key} value={p.key} style={{background:NAVY,color:CREAM}}>{p.label} — {p.credits} cr.</option>)}
                    </select>
                  </div>
                  <div style={{display:"flex",gap:10,marginBottom:12}}>
                    <div style={{flex:1}}>
                      <label style={{fontSize:12,color:`${CREAM}50`,display:"block",marginBottom:6}}>Date souhaitée</label>
                      <input type="date" value={dateRes} onChange={e=>setDateRes(e.target.value)} style={inputStyle}/>
                    </div>
                    <div style={{flex:1}}>
                      <label style={{fontSize:12,color:`${CREAM}50`,display:"block",marginBottom:6}}>Créneau (optionnel)</label>
                      <input type="text" placeholder="ex: 9h-10h" value={creneau} onChange={e=>setCreneau(e.target.value)} style={inputStyle}/>
                    </div>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 18px",borderRadius:12,background:`${CREAM}04`,marginBottom:14}}>
                    <span style={{fontSize:13,color:`${CREAM}60`}}>Coût : <strong style={{color:GOLD}}>{selectedP.credits} cr.</strong></span>
                    <span style={{fontSize:13,color:`${CREAM}60`}}>Solde après : <strong style={{color:client.solde>=selectedP.credits?GOLD:"#ff6666"}}>{(client.solde-selectedP.credits).toFixed(1)} cr.</strong></span>
                  </div>
                  <button onClick={bookWithWallet} disabled={booking||client.solde<selectedP.credits||!dateRes} style={{
                    width:"100%",padding:"16px",borderRadius:14,border:"none",cursor:"pointer",
                    background:client.solde>=selectedP.credits&&dateRes?`linear-gradient(135deg,${GOLD},${GOLD_LIGHT})`:`${CREAM}15`,
                    color:client.solde>=selectedP.credits&&dateRes?NAVY:`${CREAM}30`,
                    fontWeight:700,fontSize:15,fontFamily:"'DM Sans',sans-serif",transition:"all 0.3s",opacity:booking?0.6:1,
                  }}>
                    {booking?"Réservation en cours...":client.solde<selectedP.credits?"Solde insuffisant":"Réserver et débiter "+selectedP.credits+" crédits"}
                  </button>
                </div>

                {/* Lien recharger si solde faible */}
                {client.solde<55&&(
                  <a href="#wallet" onClick={logout} style={{
                    display:"block",textAlign:"center",marginTop:12,padding:"12px",
                    borderRadius:12,background:`${GOLD}12`,border:`1px solid ${GOLD}25`,
                    color:GOLD,fontSize:13,fontWeight:600,textDecoration:"none",transition:"all 0.3s",
                  }}
                  onMouseEnter={e=>e.currentTarget.style.background=`${GOLD}20`}
                  onMouseLeave={e=>e.currentTarget.style.background=`${GOLD}12`}
                  >Solde faible — Recharger mon wallet ↑</a>
                )}

                {/* Historique transactions */}
                {history.length>0&&(
                  <div style={{marginTop:18,borderTop:`1px solid ${CREAM}10`,paddingTop:16}}>
                    <h4 style={{fontSize:13,fontWeight:700,color:`${CREAM}60`,marginBottom:10}}>Dernières transactions</h4>
                    {history.map((h,i)=>(
                      <div key={i} style={{
                        display:"flex",justifyContent:"space-between",alignItems:"center",
                        padding:"8px 12px",borderRadius:8,background:`${CREAM}04`,marginBottom:4,
                      }}>
                        <div>
                          <div style={{fontSize:12,fontWeight:600,color:CREAM}}>{h.prestation}</div>
                          <div style={{fontSize:10,color:`${CREAM}35`}}>{h.date}</div>
                        </div>
                        <div style={{textAlign:"right"}}>
                          <div style={{fontSize:13,fontWeight:700,color:"#ff8a80"}}>-{h.debit} cr.</div>
                          <div style={{fontSize:10,color:`${CREAM}35`}}>→ {h.soldeApres.toFixed(1)} cr.</div>
                        </div>
                      </div>
                    ))}
                  </div>
                )}

                <button onClick={logout} style={{
                  display:"block",width:"100%",marginTop:16,padding:"10px",
                  background:"none",border:`1px solid ${CREAM}12`,borderRadius:10,
                  color:`${CREAM}35`,fontSize:12,cursor:"pointer",
                  fontFamily:"'DM Sans',sans-serif",transition:"all 0.3s",
                }}
                onMouseEnter={e=>{e.currentTarget.style.borderColor=`${CREAM}30`;e.currentTarget.style.color=`${CREAM}55`}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor=`${CREAM}12`;e.currentTarget.style.color=`${CREAM}35`}}
                >Se déconnecter</button>
              </div>
            )}

            <div style={{marginTop:20,padding:"14px 16px",borderRadius:12,background:`${CREAM}03`,border:`1px solid ${CREAM}08`}}>
              <div style={{fontSize:12,fontWeight:700,color:`${CREAM}45`,marginBottom:8}}>Crédits utilisables sur :</div>
              <div style={{fontSize:12,color:`${CREAM}35`,lineHeight:1.8}}>✓ Cours individuels à l'unité · ✓ Cours collectifs à l'unité · ✓ Stages vacances · ✓ Masterclass week-end</div>
              <div style={{fontSize:12,fontWeight:700,color:"#ff6666",marginTop:10,marginBottom:6}}>Non utilisables sur :</div>
              <div style={{fontSize:12,color:`${CREAM}35`,lineHeight:1.8}}>✗ Packs 10h (déjà –10%) · ✗ Académie annuelle (750€) · ✗ Académie semestrielle (420€) · ✗ Toute promotion en cours</div>
            </div>
          </div>
        </AnimatedSection>
      </div>
    </section>
  );
}

function GiftCard(){
  const WALLET_API="https://script.google.com/macros/s/AKfycbzox1toN9GY7dMob2NP71ldDNYM93ZRzcTo4M4zTae8RjAk9tqs8bvuStNsedltQ3pibw/exec";
  const[open,setOpen]=useState(false);

  const[loading,setLoading]=useState(false);
  const[result,setResult]=useState(null);
  const[error,setError]=useState("");

  const sendGift=async()=>{
    if(!form.senderEmail.includes("@")||!form.recipientEmail.includes("@")){setError("Emails invalides");return}
    setLoading(true);setError("");
    try{
      const r=await fetch(WALLET_API,{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({action:"giftcard",...form,amount:parseFloat(form.amount)})});
      const d=await r.json();
      if(d.success) setResult(d);
      else setError(d.error||"Erreur");
    }catch(e){setError("Erreur de connexion")}
    setLoading(false);
  };

  const inputStyle={
    width:"100%",padding:"12px 16px",borderRadius:10,
    border:`1.5px solid ${GOLD}25`,background:WHITE,
    color:TEXT_DARK,fontSize:14,fontFamily:"'DM Sans',sans-serif",outline:"none",

              Offrez des crédits ML Padel à un proche. Il recevra un email avec son wallet prêt à l'emploi.
            </p>

            {!open&&!result&&(
              <button onClick={()=>setOpen(true)} style={{
                display:"inline-flex",alignItems:"center",gap:10,
                background:`linear-gradient(135deg,${GOLD},${GOLD_LIGHT})`,
                color:NAVY,padding:"16px 36px",borderRadius:50,
                border:"none",cursor:"pointer",fontWeight:700,fontSize:15,
                fontFamily:"'DM Sans',sans-serif",transition:"all 0.3s",
                boxShadow:`0 8px 30px ${GOLD}44`,
              }}
              onMouseEnter={e=>e.currentTarget.style.transform="scale(1.05)"}
              onMouseLeave={e=>e.currentTarget.style.transform="scale(1)"}

              <div style={{textAlign:"left",marginTop:16}}>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
                  <div><label style={{fontSize:11,color:`${CREAM}50`,display:"block",marginBottom:4}}>Votre nom</label>
                  <input value={form.senderName} onChange={e=>setForm({...form,senderName:e.target.value})} placeholder="Votre nom" style={inputStyle}/></div>
                  <div><label style={{fontSize:11,color:`${CREAM}50`,display:"block",marginBottom:4}}>Votre email</label>
                  <input type="email" value={form.senderEmail} onChange={e=>setForm({...form,senderEmail:e.target.value})} placeholder="votre@email.com" style={inputStyle}/></div>
